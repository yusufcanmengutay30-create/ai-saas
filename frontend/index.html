<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>AI Content Factory</title>
    <style>
      body {
        font-family: Arial;
        background: #0f0f0f;
        color: white;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }

      .box {
        width: 600px;
        background: #1c1c1c;
        padding: 20px;
        border-radius: 12px;
      }

      input,
      select {
        width: 100%;
        padding: 10px;
        margin: 10px 0;
        border-radius: 8px;
        border: none;
      }

      button {
        width: 100%;
        padding: 12px;
        background: #00ff88;
        border: none;
        font-weight: bold;
        cursor: pointer;
        border-radius: 8px;
      }

      pre {
        background: #000;
        padding: 10px;
        margin-top: 10px;
        white-space: pre-wrap;
      }
    </style>
  </head>
  <body>
    <div class="box">
      <h2>🚀 AI Content Factory</h2>

      <input
        id="prompt"
        placeholder="Prompt yaz (örn: yapay zeka ile video fikirleri)"
      />

      <select id="mode">
        <option value="youtube">YouTube</option>
        <option value="tiktok">TikTok</option>
        <option value="affiliate">Affiliate</option>
      </select>

      <button onclick="send()">Generate</button>

      <pre id="output">Sonuç burada görünecek...</pre>
    </div>

    <script>
      async function send() {
        const prompt = document.getElementById("prompt").value;
        const mode = document.getElementById("mode").value;

        document.getElementById("output").innerText = "Üretiliyor...";

        const res = await fetch("http://127.0.0.1:8000/generate", {
          method: "POST",
          headers: {
            "Content-Type": "application/json",
          },
          body: JSON.stringify({
            user: "yusuf",
            password: "1234",
            prompt: prompt,
            mode: mode,
          }),
        });

        const data = await res.json();

        document.getElementById("output").innerText =
          data.output || JSON.stringify(data, null, 2);
      }
    </script>
  </body>
</html>
